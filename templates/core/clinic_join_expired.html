{% extends 'base.html' %}
{% block title %}Invitación expirada — consulte.{% endblock %}

{% block content %}
<div class="min-h-screen bg-[#F8F9FF] flex items-center justify-center px-4 py-10">
  <div class="max-w-md w-full bg-white border border-gray-100 rounded-xl shadow-sm p-8 text-center">
    <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center text-2xl">⏱</div>
    <h1 class="text-xl font-semibold text-[#0B1C30] mb-2">Esta invitación expiró</h1>
    <p class="text-sm text-gray-500 mb-6">
      El link a {{ invitation.organization.name }} ya no es válido. Pedile a quien te invitó que te mande una invitación nueva.
    </p>
    <a href="{% url 'home' %}" class="inline-block text-sm text-[#0047AB] hover:underline">Volver al inicio</a>
  </div>
</div>
{% endblock %}
